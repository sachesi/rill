<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Rill — torrent / download</title>
  <desc>A download arrow dropping into a tray, HIG app icon style.</desc>
  <defs>
    <!-- gradient only on the curved arrow shaft (rounded cap) -->
    <linearGradient id="shaft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffbe6f"/>
      <stop offset="100%" stop-color="#f5a25d"/>
    </linearGradient>
  </defs>

  <!-- Tray at baseline: neutral slate so the warm arrow reads. Straight → flat.
       Content centered on (64,64). -->
  <!-- front profile (darker, ~4px) -->
  <path d="M24 90 h80 a4 4 0 0 1 4 4 v4 a4 4 0 0 1 -4 4 H24 a4 4 0 0 1 -4 -4 v-4 a4 4 0 0 1 4 -4 z" fill="#3d3846"/>
  <!-- top -->
  <path d="M24 86 h80 a4 4 0 0 1 4 4 v4 a4 4 0 0 1 -4 4 H24 a4 4 0 0 1 -4 -4 v-4 a4 4 0 0 1 4 -4 z" fill="#5e5c64"/>
  <!-- slot opening -->
  <rect x="40" y="90" width="48" height="4" rx="2" fill="#241f31"/>

  <!-- Download arrow shaft: rounded (curved) → gradient -->
  <rect x="56" y="22" width="16" height="40" rx="6" fill="url(#shaft)"/>
  <!-- arrowhead: flat -->
  <path d="M64 80 L42 54 L86 54 Z" fill="#e66100"/>
</svg>
